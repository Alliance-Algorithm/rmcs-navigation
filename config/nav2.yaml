bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: world
    robot_base_frame: base_link
    odom_topic: /aft_mapped_to_init
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: false

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    use_sim_time: true
    costmap_update_timeout: 2.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [position_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.2
      movement_time_allowance: 10.0

    position_goal_checker:
      stateful: true
      plugin: nav2_controller::PositionGoalChecker
      xy_goal_tolerance: 0.25

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: False
      max_vel_x: +3.5
      min_vel_x: -1.5
      max_vel_y: +2.5
      min_vel_y: -2.5
      max_vel_theta: 2.0
      min_speed_xy: 0.15
      max_speed_xy: 3.2
      min_speed_theta: 0.0
      acc_lim_x: +16.0
      decel_lim_x: -16.0
      acc_lim_y: +16.0
      decel_lim_y: -16.0
      acc_lim_theta: +3.2
      decel_lim_theta: -3.2
      vx_samples: 14
      vy_samples: 8
      vtheta_samples: 10
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.25
      path_length_tolerance: 1.0
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: False
      limit_vel_cmd_in_traj: False
      stateful: True
      critics: ["Oscillation", "BaseObstacle", "ObstacleFootprint", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "Twirling"]
      BaseObstacle.scale: 1.2
      ObstacleFootprint.scale: 1.0
      GoalAlign.scale: 8.0
      GoalAlign.forward_point_distance: 0.1
      PathAlign.scale: 12.0
      PathAlign.forward_point_distance: 0.1
      PathDist.scale: 12.0
      GoalDist.scale: 10.0
      Twirling.scale: 12.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      footprint: "[[0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15]]"
      global_frame: world
      robot_base_frame: base_link
      rolling_window: true
      width: 16
      height: 16
      resolution: 0.04
      transform_tolerance: 0.2
      always_send_full_costmap: true
      footprint_padding: 0.03
      track_unknown_space: false
      plugins: [static_layer, inflation_layer]

      # 数据源来自这个包: rmcs-local-map
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_topic: /local_map
        map_subscribe_transient_local: false
        subscribe_to_updates: true
        use_maximum: true
        track_unknown_space: false
        lethal_cost_threshold: 90

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.2
        cost_scaling_factor: 1.2

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      footprint: "[[0.15, 0.15], [0.15, -0.15], [-0.15, -0.15], [-0.15, 0.15]]"
      global_frame: world
      robot_base_frame: base_link
      rolling_window: true
      width: 40
      height: 40
      resolution: 0.1
      transform_tolerance: 0.5
      always_send_full_costmap: true

      track_unknown_space: true
      plugins: [static_layer, inflation_layer]

      # 数据源来自栅格地图文件（png, yaml）
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_topic: /map
        map_subscribe_transient_local: true
        subscribe_to_updates: true
        use_maximum: true
        track_unknown_space: false
        lethal_cost_threshold: 90

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.4
        cost_scaling_factor: 6.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, wait]
    spin:
      plugin: nav2_behaviors::Spin
    backup:
      plugin: nav2_behaviors::BackUp
    drive_on_heading:
      plugin: nav2_behaviors::DriveOnHeading
    wait:
      plugin: nav2_behaviors::Wait
    global_frame: world
    local_frame: world
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 30.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [+3.5, +3.5, +3.0]
    min_velocity: [-3.5, -3.5, -3.0]
    max_accel: [+8.0, +30.0, +10.0]
    max_decel: [-8.0, -30.0, -10.0]
    odom_topic: /aft_mapped_to_init
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.02, 0.02]
    velocity_timeout: 1.0

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
