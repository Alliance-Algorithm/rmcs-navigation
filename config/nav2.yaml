rmcs_navigation:
  ros__parameters:
    map_yaml: maps/rmul.yaml
    local_map_yaml: maps/local_mock.yaml
    local_map_mock_topic: /local_map

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: world
    robot_base_frame: base_link
    odom_topic: /aft_mapped_to_init
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: false

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    costmap_update_timeout: 2.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.2
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: false
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 6.28

    FollowPath:
      # MPPI 速度调参说明：
      # - 速度上限：vx_max/vx_min 控制前后速度，vy_max 控制侧向速度，
      #   wz_max 控制角速度上限。
      # - 加速度上限：ax_max/ax_min、ay_max/ay_min、az_max 决定机器人多快
      #   能加到目标速度。
      # - 采样范围：vx_std、vy_std、wz_std 决定 MPPI 对更快轨迹的探索范围；
      #   如果只提高速度上限，不提高这些参数，实际行为仍可能偏保守。
      # - 输出限幅：下方 velocity_smoother 的 max/min velocity 和 accel/decel
      #   也要同步调整，否则 FollowPath 算出的速度会被平滑器截断。
      plugin: nav2_mppi_controller::MPPIController
      time_steps: 48
      model_dt: 0.05
      batch_size: 1800
      iteration_count: 2
      vx_max: +2.2
      vx_min: -1.2
      vy_max: 1.6
      wz_max: 1.8
      ax_max: +2.5
      ax_min: -2.5
      ay_max: 2.5
      ay_min: -2.5
      az_max: 2.2
      vx_std: 1.00
      vy_std: 1.00
      wz_std: 0.12
      temperature: 0.22
      gamma: 0.06
      motion_model: Omni
      visualize: false
      publish_optimal_trajectory: false
      regenerate_noises: false
      TrajectoryValidator:
        plugin: mppi::DefaultOptimalTrajectoryValidator
        collision_lookahead_time: 0.7
        consider_footprint: false
      critics: [ConstraintCritic, CostCritic, GoalCritic, PathAlignCritic, PathFollowCritic, TwirlingCritic]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 10.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 1.0
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 0.5
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 1.0
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 9.0
        offset_from_furthest: 8
        threshold_to_consider: 10.0
      TwirlingCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      robot_radius: 0.3
      global_frame: base_link
      robot_base_frame: base_link
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.02
      transform_tolerance: 0.2
      always_send_full_costmap: true
      footprint_padding: 0.02
      track_unknown_space: false
      plugins: [static_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_topic: /local_map
        map_subscribe_transient_local: true
        subscribe_to_updates: true
        use_maximum: true
        track_unknown_space: false
        lethal_cost_threshold: 90

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.35
        cost_scaling_factor: 6.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: world
      robot_base_frame: base_link
      rolling_window: true
      width: 20
      height: 20
      resolution: 0.05
      transform_tolerance: 0.5
      always_send_full_costmap: true
      track_unknown_space: true
      plugins: [static_layer, inflation_layer]

      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_topic: /map
        map_subscribe_transient_local: true
        subscribe_to_updates: true
        use_maximum: true
        track_unknown_space: false
        lethal_cost_threshold: 90

      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        inflation_radius: 0.35
        cost_scaling_factor: 6.0

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 10.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner::NavfnPlanner
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: [spin, backup, drive_on_heading, wait]
    spin:
      plugin: nav2_behaviors::Spin
    backup:
      plugin: nav2_behaviors::BackUp
    drive_on_heading:
      plugin: nav2_behaviors::DriveOnHeading
    wait:
      plugin: nav2_behaviors::Wait
    global_frame: world
    local_frame: world
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 2.0

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 30.0
    scale_velocities: false
    feedback: OPEN_LOOP
    max_velocity: [+2.2, +1.6, +1.8]
    min_velocity: [-1.2, -1.6, -1.8]
    max_accel: [+2.0, +2.0, +1.8]
    max_decel: [-2.2, -2.2, -2.0]
    odom_topic: /aft_mapped_to_init
    odom_duration: 0.1
    deadband_velocity: [0.02, 0.02, 0.02]
    velocity_timeout: 1.0

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
